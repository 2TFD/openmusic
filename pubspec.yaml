name: openmusic
description: "Open-source music player for listening to music from multiple sources in a unified library."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.10.4

dependencies:
  equatable: ^2.0.8
  easy_localization: ^3.0.7
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  go_router: ^17.1.0
  google_fonts: ^8.0.2
  just_audio: ^0.10.5
  audio_service: ^0.18.18
  just_audio_background: ^0.0.1-beta.17
  path_provider: ^2.1.0
  youtube_explode_dart: ^3.1.0
  file_picker: ^10.3.10
  ffmpeg_kit_flutter_new: ^4.1.0
  flutter_launcher_icons: ^0.14.4
  html: ^0.15.6
  dio: ^5.9.2
  lottie: ^3.3.3
  cached_network_image: ^3.4.1
  drift: ^2.33.0
  drift_flutter: ^0.3.0
  background_downloader: ^9.5.5
  get_it: ^9.2.1
  flutter_dotenv: ^5.2.1

dev_dependencies:
  build_runner: ^2.4.0
  drift_dev: ^2.33.0
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/translations/
    - .env

flutter_icons:
  image_path: "assets/app_icon/Appicon.png"
  android: true
  ios: true
